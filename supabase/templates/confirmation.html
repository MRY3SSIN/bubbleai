<div style="background:#f7fbf8;padding:32px 16px;font-family:Arial,sans-serif;color:#10201e;">
  <div style="max-width:520px;margin:0 auto;background:#ffffff;border-radius:28px;padding:32px;border:1px solid #d5e8e2;">
    <div style="font-size:14px;line-height:20px;font-weight:700;color:#12a28b;margin-bottom:12px;">BubbleAI</div>
    <h1 style="font-size:30px;line-height:36px;margin:0 0 12px 0;">Confirm your signup</h1>
    <p style="font-size:16px;line-height:24px;color:#627571;margin:0 0 24px 0;">
      Here is your 6 digit BubbleAI signup code. Enter it in the app to finish creating your account.
    </p>
    <div style="background:#dff1ee;border-radius:24px;padding:20px;text-align:center;margin-bottom:24px;">
      <div style="font-size:34px;line-height:38px;letter-spacing:8px;font-weight:700;color:#0c5147;">{{ .Token }}</div>
    </div>
    <p style="font-size:14px;line-height:22px;color:#627571;margin:0;">
      This code expires in 1 hour. If you did not request this, you can ignore this email.
    </p>
  </div>
</div>
